<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>大港開唱 2026</title>
  <meta name="description" content="2026 大港開唱時刻表 - 查看演出時程、收藏喜愛樂團">

  <!-- Open Graph -->
  <meta property="og:title" content="大港開唱 2026 | Megaport Festival">
  <meta property="og:description" content="2026 大港開唱時刻表 - 查看演出時程、收藏喜愛樂團">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://megaportfest.com/wp-content/uploads/2021/12/title-lineup.png">

  <!-- PWA -->
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <meta name="theme-color" content="#08080a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MEGAPORT">
  <link rel="apple-touch-icon" href="./icon.svg">

  <link rel="stylesheet" href="./styles.css">
</head>
<body>

  <!-- fixed header -->
  <div id="header">
    <div class="header-top">
      <div class="header-title">MEGAPORT FEST 2026</div>
      <div class="header-actions">
        <button class="btn-icon" id="btn-fav" title="SHOW FAVORITES">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        </button>
        <button class="btn-icon" id="btn-hidden" title="SHOW HIDDEN">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="date-tabs" id="date-tabs"></div>
  </div>

  <!-- sticky stage filter -->
  <div class="stage-filter-wrap">
    <div class="stage-filter" id="stage-filter"></div>
  </div>

  <!-- scrollable content (now-next banner + stage list) -->
  <div id="main">
    <div id="now-next"></div>
    <div id="perf-list"></div>
  </div>

  <!-- modal overlay -->
  <div class="modal-overlay" id="modal-overlay"></div>

  <!-- floating action button -->
  <button class="fab" id="btn-view-mode" title="TOGGLE VIEW MODE">
    <!-- icon set by js -->
  </button>

  <script type="module" src="./app.js"></script>
</body>
</html>
